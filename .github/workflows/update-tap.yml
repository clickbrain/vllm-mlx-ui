name: Update Homebrew tap on release

on:
  push:
    tags:
      - 'v*'

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TAP_DEPLOY_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download tarball and compute sha256
        id: sha256
        run: |
          VERSION=${{ steps.version.outputs.version }}
          URL="https://github.com/clickbrain/vllm-mlx-ui/archive/refs/tags/v${VERSION}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Update Formula/vllm-mlx-ui.rb in main repo
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=${{ steps.sha256.outputs.sha256 }}
          URL=${{ steps.sha256.outputs.url }}
          sed -i "s|url \"https://github.com/clickbrain/vllm-mlx-ui/archive/refs/tags/v[^\"]*\"|url \"${URL}\"|" Formula/vllm-mlx-ui.rb
          sed -i "s|sha256 \"[a-f0-9]*\"|sha256 \"${SHA}\"|" Formula/vllm-mlx-ui.rb
          sed -i "s|version \"[^\"]*\"|version \"${VERSION}\"|" Formula/vllm-mlx-ui.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/vllm-mlx-ui.rb
          git diff --cached --quiet || git commit -m "chore: update formula to v${VERSION}"
          git push origin HEAD:main

      - name: Dispatch to tap repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_DEPLOY_TOKEN }}
          repository: clickbrain/homebrew-vllm-mlx-ui
          event-type: new-release
          client-payload: |
            {
              "version": "${{ steps.version.outputs.version }}",
              "sha256": "${{ steps.sha256.outputs.sha256 }}"
            }
