name: Update Homebrew tap on release

# PRIMARY PATH: scripts/release.sh handles everything including the tap repo.
# This workflow is a manual fallback if release.sh's tap step fails.
# Trigger: gh workflow run update-tap.yml --field tag=vX.Y.Z

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to update formula for (e.g. v0.3.76)"
        required: true

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag input
        id: version
        run: |
          RAW="${{ github.event.inputs.tag }}"
          echo "version=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Download tarball and compute sha256
        id: sha256
        run: |
          VERSION=${{ steps.version.outputs.version }}
          URL="https://github.com/clickbrain/vllm-mlx-ui/archive/refs/tags/v${VERSION}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Dispatch to tap repo
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_DEPLOY_TOKEN }}
          repository: clickbrain/homebrew-vllm-mlx-ui
          event-type: new-release
          client-payload: |
            {
              "version": "${{ steps.version.outputs.version }}",
              "sha256": "${{ steps.sha256.outputs.sha256 }}"
            }
