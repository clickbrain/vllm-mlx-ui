name: "Feature Request"
description: "Suggest an enhancement or new feature"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Please describe it below.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: "Which area does this affect?"
      options:
        - Python backend
        - Vue frontend
        - Both
        - Infrastructure/Tooling
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: "What problem does this feature solve?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How should this work?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: "Any alternative approaches you've thought about?"
